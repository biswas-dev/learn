services:
  learn:
    image: harbor.biswas.me/biswas/learn:x64-latest
    ports:
      - "13427:8080"
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
