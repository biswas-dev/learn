# Nginx configuration for learn.biswas.me (Cloudflare Full Strict SSL)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=learn_api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=learn_auth:10m rate=20r/m;

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name learn.biswas.me;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name learn.biswas.me;

    # Cloudflare Origin Certificate (15-year)
    ssl_certificate /etc/ssl/learn.biswas.me/origin-cert.pem;
    ssl_certificate_key /etc/ssl/learn.biswas.me/origin-key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:LearnSSL:10m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/learn.biswas.me_access.log;
    error_log /var/log/nginx/learn.biswas.me_error.log;

    # Max upload size (for course import archives)
    client_max_body_size 100M;

    # Friendly maintenance page during deployments
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><title>Updating...</title><meta http-equiv="refresh" content="5"></head><body style="font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#0b0d14;color:#f1f5f9"><div style="text-align:center"><h1>Updating Learn</h1><p style="color:#7c8ca8">Please wait a moment, this page will refresh automatically.</p></div></body></html>';
    }

    # Auth endpoints (stricter rate limiting)
    location ~ ^/api/auth {
        limit_req zone=learn_auth burst=3 nodelay;

        proxy_pass http://127.0.0.1:13426;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
        limit_req zone=learn_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:13426;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 5s;
        proxy_next_upstream_tries 2;
    }

    # Health check (no logging)
    location /health {
        proxy_pass http://127.0.0.1:13426;
        access_log off;
    }

    # go-draw canvas editor
    location ^~ /draw/ {
        proxy_pass http://127.0.0.1:13426;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images (served by backend, long cache)
    location /images/ {
        proxy_pass http://127.0.0.1:13426;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else -> backend (serves SPA frontend)
    location / {
        proxy_pass http://127.0.0.1:13426;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 5s;
        proxy_next_upstream_tries 2;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://127.0.0.1:13426;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;
}
